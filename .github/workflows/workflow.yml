name: Daily Docker Task

on:
  schedule:
    - cron: "0 2 * * *"  # runs daily at 02:00 UTC
  workflow_dispatch:      # allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  check-release:
    runs-on: ubuntu-latest
    outputs:
      release_found: ${{ steps.get_release.outputs.release_found }}
      RELEASE: ${{ steps.get_release.outputs.RELEASE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/m-ahadi/n8n-enterprise

      - name: Fetch and List Tags
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: "n8n-enterprise"
        run: |
          VERSIONS_JSON=$(gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            /user/packages/container/$PACKAGE_NAME/versions)
          
          TAGS=$(echo "$VERSIONS_JSON" | jq -r '.[].metadata.container.tags[] | select(. != null)')
          
          echo "$TAGS" > tags.txt

      - name: Get value from API
        id: get_release
        run: |
          set -e
          RELEASE=$(python check_new_release.py)
          if [ -z "$RELEASE" ]; then
            echo "No new release found, stopping workflow."
            echo "release_found=false" >> $GITHUB_OUTPUT
          else
            echo "RELEASE=$RELEASE" >> $GITHUB_OUTPUT
            echo "Found release: $RELEASE"
            echo "release_found=true" >> $GITHUB_OUTPUT
          fi


  build-and-push:
    needs: check-release
    if: needs.check-release.outputs.release_found == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      RELEASE: ${{ needs.check-release.outputs.RELEASE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          set -e
          RELEASE=$RELEASE IMAGE_TAG=$RELEASE docker compose -f docker-compose_build.yml up
        env:
          # --- ADDED: Pass Node memory limits to the build process ---
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Push Docker image(s) to Docker Hub
        run: |
          set -e
          docker push "ghcr.io/m-ahadi/n8n-enterprise:$RELEASE"
          docker tag "ghcr.io/m-ahadi/n8n-enterprise:$RELEASE" "ghcr.io/m-ahadi/n8n-enterprise:latest"
          docker push "ghcr.io/m-ahadi/n8n-enterprise:latest"

  notify:
    needs: [check-release, build-and-push]
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}
      RELEASE: ${{ needs.check-release.outputs.RELEASE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Send Telegram notification
        run: |
          set -e
          python send_message.py
