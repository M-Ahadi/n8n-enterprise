name: Daily Docker Task

on:
  schedule:
    - cron: "0 2 * * *"  # runs daily at 02:00 UTC
  workflow_dispatch:      # allows manual trigger

jobs:
  daily-task:
    runs-on: ubuntu-latest
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_ID: ${{ secrets.TELEGRAM_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}

      - name: Save tags
        run: echo "${{ steps.meta.outputs.tags }}" > tags.txt

      - name: Get value from API
        id: get_release
        run: |
          set -e
          RELEASE=$(python check_new_release.py)
          if [ -z "$RELEASE" ]; then
            echo "No new release found, stopping workflow."
            echo "release_found=false" >> $GITHUB_OUTPUT
          else
            echo "RELEASE=$RELEASE" >> $GITHUB_ENV
            echo "Found release: $RELEASE"
            echo "release_found=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.get_release.outputs.release_found == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.get_release.outputs.release_found == 'true'
        run: |
          set -e
          RELEASE=$RELEASE IMAGE_TAG=$RELEASE docker compose -f docker-compose_build.yml up
        env:
          # --- ADDED: Pass Node memory limits to the build process ---
          NODE_OPTIONS: "--max-old-space-size=6144"

      - name: Push Docker image(s) to Docker Hub
        if: steps.get_release.outputs.release_found == 'true'
        run: |
          set -e
          docker push "ghcr.io/${{ github.repository }}:$RELEASE"
          docker tag "ghcr.io/${{ github.repository }}:$RELEASE" "ghcr.io/${{ github.repository }}:enterprise"
          docker push "ghcr.io/${{ github.repository }}:enterprise"
          

      - name: Send Telegram notification
        if: steps.get_release.outputs.release_found == 'true'
        run: |
          set -e
          python send_message.py